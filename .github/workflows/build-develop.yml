name: Build Develop Branch

on:
  push:
    branches:
      - develop

permissions:
  contents: read

jobs:
  build:
    name: Build on Develop Push
    runs-on: self-hosted  #ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get commit short hash
        id: commit
        run: echo "SHORT_HASH=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Get current date
        id: date
        run: echo "DATE=$(date +'%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Prepare build archive
        run: |
          ARCHIVE_DIR="opnsense-xray-develop"
          ARCHIVE_NAME="opnsense-xray-develop"
          ARCHIVE_NAME_VER="opnsense-xray-develop-${{ steps.date.outputs.DATE }}-${{ steps.commit.outputs.SHORT_HASH }}"
          mkdir -p "${ARCHIVE_DIR}"

          # Копируем все файлы, необходимые для установки.
          # Исключаем служебные каталоги (.git, .github) и сам каталог архива.
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude="${ARCHIVE_DIR}" \
            . "${ARCHIVE_DIR}/"

          # Создаём .tar.gz архив
          tar -czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_DIR}"

          echo "ARCHIVE_DIR=${ARCHIVE_DIR}" >> "$GITHUB_ENV"
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> "$GITHUB_ENV"
          echo "ARCHIVE_NAME_VER=${ARCHIVE_NAME_VER}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}.tar.gz
          path: ${{ env.ARCHIVE_NAME }}.tar.gz
          retention-days: 7

      - name: Upload versioned artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME_VER }}
          path: ${{ env.ARCHIVE_NAME_VER }}.tar.gz
          retention-days: 14

      - name: Display build info
        run: |
          echo "Build Information:"
          echo "  Branch: develop"
          echo "  Commit: ${{ steps.commit.outputs.SHORT_HASH }}"
          echo "  Date: ${{ steps.date.outputs.DATE }}"
          echo "  Archive: ${{ env.ARCHIVE_NAME }}.tar.gz"
          echo "  Versioned archive: ${{ env.ARCHIVE_NAME_VER }}.tar.gz"
          ls -lh "${{ env.ARCHIVE_NAME }}.tar.gz"
          ls -lh "${{ env.ARCHIVE_NAME_VER }}.tar.gz"

      - name: Generate changelog to release message
        id: changelog
        run: |
          DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/develop/${ARCHIVE_NAME}.tar.gz"
          DOWNLOAD_URL_VER="https://github.com/${GITHUB_REPOSITORY}/releases/download/develop/${ARCHIVE_NAME_VER}.tar.gz"

          {
            echo ""
            echo "---"
            echo "### Manual installation"
            echo '```sh'
            echo "fetch -o /tmp/opnsense-xray.tar.gz ${DOWNLOAD_URL_VER}"
            echo "cd /tmp && tar xzf opnsense-xray.tar.gz"
            echo "cd opnsense-xray"
            echo "chmod +x install.sh && sh install.sh"
            echo '```'

            echo "or non-versioned link ${DOWNLOAD_URL}"
            
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-dev
          name: "opnsense-xray (Develop branch)"
          body: ${{ steps.changelog.outputs.BODY }}
          draft: false
          prerelease: true
          files: |
            ${{ env.ARCHIVE_NAME }}.tar.gz
            ${{ env.ARCHIVE_NAME_VER }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
